<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ComfyUI Bridge</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            margin: 0;
            background-color: #2d2d2d;
            color: #e8e8e8;
            overflow-y: auto;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section {
            background: #3d3d3d;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #4d4d4d;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .button {
            width: 100%;
            padding: 10px 16px;
            background: #1473e6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .button:hover { background: #0d66d0; }
        .button:disabled { background: #4d4d4d; color: #8d8d8d; cursor: not-allowed; }
        .button.secondary { background: #4d4d4d; }
        .button.secondary:hover { background: #5d5d5d; }
        .button.success { background: #2e7d32; }

        .input-group { margin-bottom: 12px; }

        .input-label {
            display: block;
            font-size: 12px;
            color: #b8b8b8;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 8px 12px;
            background: #2d2d2d;
            border: 1px solid #4d4d4d;
            border-radius: 4px;
            color: #e8e8e8;
            font-size: 13px;
            box-sizing: border-box;
        }

        .input-field:focus { outline: none; border-color: #1473e6; }

        .status {
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            min-height: 20px;
        }

        .status.success { background: rgba(46,204,113,.2); color: #2ecc71; border: 1px solid rgba(46,204,113,.4); }
        .status.error   { background: rgba(231,76,60,.2);  color: #e74c3c; border: 1px solid rgba(231,76,60,.4); }
        .status.info    { background: rgba(52,152,219,.2); color: #3498db; border: 1px solid rgba(52,152,219,.4); }
        .status.warning { background: rgba(241,196,15,.2); color: #f1c40f; border: 1px solid rgba(241,196,15,.4); }

        .radio-group { display: flex; gap: 16px; margin-bottom: 12px; }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .help-text { font-size: 11px; color: #8d8d8d; margin-top: 4px; }

        .url-result { display: none; margin-top: 12px; }

        .url-box {
            background: #1a1a1a;
            border: 1px solid #4d4d4d;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 11px;
            color: #a0c4ff;
            word-break: break-all;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .key-source-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .key-source-badge.file    { background: rgba(46,204,113,.2); color: #2ecc71; border: 1px solid rgba(46,204,113,.3); }
        .key-source-badge.storage { background: rgba(52,152,219,.2); color: #3498db; border: 1px solid rgba(52,152,219,.3); }
        .key-source-badge.manual  { background: rgba(241,196,15,.2); color: #f1c40f; border: 1px solid rgba(241,196,15,.3); }
    </style>
</head>
<body>
    <div class="container">

        <!-- API Key Settings -->
        <div class="section">
            <div class="section-title">
                Settings
                <span id="key-source-badge" class="key-source-badge" style="display:none"></span>
            </div>
            <div class="input-group">
                <label class="input-label">FAL API Key</label>
                <input type="password" id="fal-api-key" class="input-field" placeholder="key-xxxxxxxxxxxx">
                <div class="help-text" id="key-help-text">
                    Place <strong>fal_api_key.txt</strong> in the plugin data folder, or enter manually below.
                </div>
            </div>
            <div class="input-group">
                <label class="input-label">ComfyUI URL</label>
                <input type="text" id="comfyui-url" class="input-field" placeholder="https://xxx-8188.proxy.runpod.net">
            </div>
            <button id="save-key-btn" class="button secondary">Save Settings to File</button>
            <div id="save-key-status" class="status" style="display:none"></div>
        </div>

        <!-- Upload -->
        <div class="section">
            <div class="section-title">Upload to Fal Storage</div>

            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="export-type" value="layer" checked>
                    Active Layer
                </label>
                <label class="radio-label">
                    <input type="radio" name="export-type" value="document">
                    Full Document
                </label>
            </div>

            <button id="upload-btn" class="button">Upload to Fal.ai</button>
            <button id="test-btn" class="button secondary" style="font-size:11px;padding:6px;">Test network (debug)</button>
            <div id="upload-status" class="status"></div>

            <div class="url-result" id="url-result">
                <div class="input-label">Paste this URL into the LoadImageFromURL node in ComfyUI:</div>
                <div class="url-box" id="result-url"></div>
                <button id="copy-btn" class="button secondary">Copy URL</button>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
